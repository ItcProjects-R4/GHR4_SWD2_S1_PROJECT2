<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful student grade calculator that converts numeric scores to letter grades with plus/minus designations." />
  <title>Student Grade System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <div class="header">
      <i class="fa-solid fa-graduation-cap header-icon"></i>
      <h1>Student Grade System</h1>
      <p class="subtitle">Enter a score from 0 to 100 to get your letter grade</p>
    </div>

    <div class="card">
      <button id="btn" type="button"><i class="fa-solid fa-pen-to-square"></i> Enter Grade</button>

      <div class="output-container" id="output-container">
        <div id="output" class="output">
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
